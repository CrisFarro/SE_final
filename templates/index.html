<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Bayesiano de Adquisiciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fa-solid fa-brain text-xl"></i></div>
                <div>
                    <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Agente Bayesiano Corporativo</h1>
                    <p class="text-xs text-slate-400">Sistema Inteligente de Evaluación de Proveedores</p>
                </div>
            </div>
            <div class="flex items-center space-x-4 bg-slate-800/60 px-4 py-2 rounded-lg border border-slate-700/50 text-sm">
                <span><i class="fa-solid fa-filter text-indigo-400 mr-2"></i>Umbrales:</span>
                <span class="text-slate-300">Max: $<span id="lbl-presupuesto">5000</span> USD</span>
                <span class="text-slate-500">|</span>
                <span class="text-slate-300">Plazo: <span id="lbl-plazo">15</span> días</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Control Tabs -->
        <div class="flex space-x-4 mb-6">
            <button onclick="switchTab('csv')" id="tab-csv" class="flex-1 py-3 px-6 rounded-xl font-medium text-sm transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20">
                <i class="fa-solid fa-file-csv mr-2"></i>Evaluación por Lote (CSV)
            </button>
            <button onclick="switchTab('manual')" id="tab-manual" class="flex-1 py-3 px-6 rounded-xl font-medium text-sm transition-all bg-slate-800 text-slate-400 hover:text-white">
                <i class="fa-solid fa-sliders mr-2"></i>Simulador Manual
            </button>
        </div>

        <!-- Panel CSV -->
        <div id="panel-csv" class="bg-slate-800/40 border border-slate-800 rounded-2xl p-6 mb-8">
            <form id="form-csv" class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="w-full md:w-auto flex-1">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Archivo de Proveedores (.CSV)</label>
                    <input type="file" id="csv-file" accept=".csv" required
                        class="block w-full text-sm text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600/10 file:text-indigo-400 hover:file:bg-indigo-600/20 cursor-pointer border border-slate-700 rounded-xl bg-slate-900/50">
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Presupuesto ($)</label>
                        <input type="number" id="csv-presupuesto" value="5000" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 w-28 text-sm focus:outline-none focus:border-indigo-500" onchange="updateLabels()">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Plazo (Días)</label>
                        <input type="number" id="csv-plazo" value="15" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 w-24 text-sm focus:outline-none focus:border-indigo-500" onchange="updateLabels()">
                    </div>
                    <button type="submit" class="self-end bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl text-sm font-semibold transition shadow-lg shadow-indigo-600/30 flex items-center h-[38px]">
                        <i class="fa-solid fa-play mr-2"></i>Procesar
                    </button>
                </div>
            </form>
        </div>

        <!-- Panel Manual (Oculto por defecto) -->
        <div id="panel-manual" class="hidden bg-slate-800/40 border border-slate-800 rounded-2xl p-6 mb-8">
            <form id="form-manual" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Empresa</label>
                    <input type="text" id="man-name" placeholder="Ej. TechSolutions S.A." required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Cotización (USD)</label>
                    <input type="number" id="man-precio" placeholder="4500" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tiempo de Entrega (Días)</label>
                    <input type="number" id="man-plazo" placeholder="10" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4 pt-2 border-t border-slate-800/80">
                    <label class="flex items-center space-x-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800 cursor-pointer hover:border-slate-700">
                        <input type="checkbox" id="man-iso" class="rounded text-indigo-600 focus:ring-0 w-4 h-4 bg-slate-800 border-slate-600">
                        <span class="text-sm font-medium">Certificación ISO 9001</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800 cursor-pointer hover:border-slate-700">
                        <input type="checkbox" id="man-historial" class="rounded text-indigo-600 focus:ring-0 w-4 h-4 bg-slate-800 border-slate-600">
                        <span class="text-sm font-medium text-amber-400">¿Tiene Litigios Legales?</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-slate-900/60 p-3 rounded-xl border border-slate-800 cursor-pointer hover:border-slate-700">
                        <input type="checkbox" id="man-credito" class="rounded text-indigo-600 focus:ring-0 w-4 h-4 bg-slate-800 border-slate-600">
                        <span class="text-sm font-medium">Línea de Crédito Aprobada</span>
                    </label>
                </div>
                <div class="md:col-span-3 flex justify-end">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-2.5 rounded-xl text-sm font-semibold transition shadow-lg shadow-indigo-600/30">
                        Ejecutar Inferencia Bayesiana
                    </button>
                </div>
            </form>
        </div>

        <!-- Contenedor de Resultados -->
        <div id="loading" class="hidden py-12 text-center text-slate-400">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500 mb-3"></i>
            <p class="text-sm">Ejecutando inferencia por eliminación de variables...</p>
        </div>

        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        function switchTab(tab) {
            document.getElementById('panel-csv').classList.toggle('hidden', tab !== 'csv');
            document.getElementById('panel-manual').classList.toggle('hidden', tab !== 'manual');
            
            const btnCsv = document.getElementById('tab-csv');
            const btnMan = document.getElementById('tab-manual');
            
            if(tab === 'csv') {
                btnCsv.className = "flex-1 py-3 px-6 rounded-xl font-medium text-sm transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20";
                btnMan.className = "flex-1 py-3 px-6 rounded-xl font-medium text-sm transition-all bg-slate-800 text-slate-400 hover:text-white";
            } else {
                btnMan.className = "flex-1 py-3 px-6 rounded-xl font-medium text-sm transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20";
                btnCsv.className = "flex-1 py-3 px-6 rounded-xl font-medium text-sm transition-all bg-slate-800 text-slate-400 hover:text-white";
            }
        }

        function updateLabels() {
            document.getElementById('lbl-presupuesto').innerText = document.getElementById('csv-presupuesto').value;
            document.getElementById('lbl-plazo').innerText = document.getElementById('csv-plazo').value;
        }

        function renderCards(data) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                let badgeClass = "bg-red-500/10 text-red-400 border-red-500/20";
                let icon = "fa-circle-xmark";
                if(item.color === 'green') { badgeClass = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20"; icon = "fa-circle-check"; }
                if(item.color === 'yellow') { badgeClass = "bg-amber-500/10 text-amber-400 border-amber-500/20"; icon = "fa-triangle-exclamation"; }

                const card = `
                    <div class="bg-slate-800/60 border border-slate-700/80 rounded-2xl p-6 flex flex-col justify-between hover:border-slate-600 transition">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="font-bold text-lg text-white">${item.name}</h3>
                                <span class="px-3 py-1 rounded-full text-xs font-semibold border flex items-center gap-1.5 ${badgeClass}">
                                    <i class="fa-solid ${icon}"></i> ${item.dictamen}
                                </span>
                            </div>
                            
                            <!-- Barras de Probabilidad -->
                            <div class="space-y-3 mb-6">
                                <div>
                                    <div class="flex justify-between text-xs mb-1">
                                        <span class="text-slate-400">Elegible (Aprobado)</span>
                                        <span class="font-bold text-emerald-400">${item.probs.elegible}%</span>
                                    </div>
                                    <div class="w-full bg-slate-900 rounded-full h-1.5">
                                        <div class="bg-emerald-500 h-1.5 rounded-full" style="width: ${item.probs.elegible}%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs mb-1">
                                        <span class="text-slate-400">Auditoría Requerida</span>
                                        <span class="font-bold text-amber-400">${item.probs.auditoria}%</span>
                                    </div>
                                    <div class="w-full bg-slate-900 rounded-full h-1.5">
                                        <div class="bg-amber-500 h-1.5 rounded-full" style="width: ${item.probs.auditoria}%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs mb-1">
                                        <span class="text-slate-400">Rechazo</span>
                                        <span class="font-bold text-red-400">${item.probs.rechazo}%</span>
                                    </div>
                                    <div class="w-full bg-slate-900 rounded-full h-1.5">
                                        <div class="bg-red-500 h-1.5 rounded-full" style="width: ${item.probs.rechazo}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Evidencia -->
                        <div class="pt-4 border-t border-slate-700/60 grid grid-cols-2 gap-2 text-xs text-slate-400">
                            <div><span class="text-slate-500">Cotización:</span> $${item.crudo.precio}</div>
                            <div><span class="text-slate-500">Plazo:</span> ${item.crudo.plazo} días</div>
                            <div><span class="text-slate-500">ISO 9001:</span> ${item.evidencia.ISO ? '<span class="text-emerald-400">Sí</span>' : '<span class="text-red-400">No</span>'}</div>
                            <div><span class="text-slate-500">Litigios:</span> ${item.evidencia.Historial === 0 ? '<span class="text-red-400">Sí</span>' : '<span class="text-emerald-400">Limpio</span>'}</div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        document.getElementById('form-csv').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('csv-file').files[0]);
            formData.append('presupuesto_limite', document.getElementById('csv-presupuesto').value);
            formData.append('plazo_maximo', document.getElementById('csv-plazo').value);

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results-grid').innerHTML = '';

            const res = await fetch('/api/evaluar-csv', { method: 'POST', body: formData });
            const json = await res.json();
            
            document.getElementById('loading').classList.add('hidden');
            if(json.status === 'success') renderCards(json.data);
            else alert('Error: ' + json.message);
        });

        document.getElementById('form-manual').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('man-name').value,
                precio: document.getElementById('man-precio').value,
                plazo: document.getElementById('man-plazo').value,
                iso: document.getElementById('man-iso').checked,
                historial: document.getElementById('man-historial').checked,
                credito: document.getElementById('man-credito').checked,
                presupuesto_limite: document.getElementById('csv-presupuesto').value,
                plazo_maximo: document.getElementById('csv-plazo').value
            };

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results-grid').innerHTML = '';

            const res = await fetch('/api/evaluar-manual', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const json = await res.json();
            
            document.getElementById('loading').classList.add('hidden');
            if(json.status === 'success') renderCards(json.data);
            else alert('Error: ' + json.message);
        });
    </script>
</body>
</html>
